# Netlify config — Bodega Cicchitti
# Sitio estático puro (sin build step por ahora)

[build]
  publish = "."

# /pages/x.html → /x  (elimina carpeta y extensión)
[[redirects]]
  from = "/pages/*.html"
  to = "/:splat"
  status = 301
  force = true

# /pages/x → /x  (elimina carpeta)
[[redirects]]
  from = "/pages/*"
  to = "/:splat"
  status = 301
  force = true

# /x.html → /x  (elimina extensión, para index u otros archivos en raíz)
[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# /x → sirve internamente /pages/x.html (URL limpia sin carpeta ni extensión)
[[redirects]]
  from = "/*"
  to = "/pages/:splat.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache de assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
